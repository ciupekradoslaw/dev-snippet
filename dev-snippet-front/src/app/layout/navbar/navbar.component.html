<nav class="fixed top-0 left-0 right-0 z-50 border-b border-border backdrop-blur-md bg-bg-dark/80">
  <div class="flex justify-between items-center max-w-7xl mx-auto px-8 h-20">

    <app-logo></app-logo>

    @if (isLoggedIn()) {
      <div class="flex gap-6">
        <a routerLink="/" routerLinkActive="active" class="nav-link">Features</a>
        <a routerLink="/" class="nav-link">Explore</a>
        <a routerLink="/" class="nav-link">Pricing</a>
        <a routerLink="/" class="nav-link">Docs</a>
      </div>
    }


    <div class="flex gap-3 items-center">
      @if (isLoggedIn()) {
        <button mat-icon-button [matMenuTriggerFor]="userMenu">
          <mat-icon>account_circle</mat-icon>
        </button>

        <mat-menu #userMenu="matMenu">
          <div class="px-4 py-2 text-sm opacity-60">{{ user() }}</div>
          <button mat-menu-item routerLink="/profile">
            <mat-icon>person</mat-icon> Profile
          </button>
          <button mat-menu-item routerLink="/settings">
            <mat-icon>settings</mat-icon> Settings
          </button>
          <button mat-menu-item (click)="logout()">
            <mat-icon>logout</mat-icon> Logout
          </button>
        </mat-menu>
      } @else {
        <button mat-button routerLink="/auth">Sign in</button>
        <button mat-flat-button color="primary" routerLink="/auth">Get Started</button>
      }

    </div>
  </div>
</nav>
